<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spring Boot</title>
</head>
<body>
	<h2>入力内容をご確認ください。</h2>
	<table border="1">
		<thead>
			<tr>
				<th>項目</th>
				<th>入力内容</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="contactForm : ${contactForm}">
				<td>お名前</td>
				<td th:text="${contactForm.getName()}"></td>
				<tr>
					<td>メールアドレス</td>
					<td th:text="${contactForm.getEmail()}"></td>
				</tr>
				<td>お問い合わせ内容</td>
				<td th:text="${contactForm.getMessage()}"></td>
			</tr>
		</tbody>
	</table>
	
	<!-- 成功メッセージ・失敗メッセージがあれば表示 -->
	<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>
	<p th:if="${failureMessage}" th:text="${failureMessage}" style="color: red;"></p>
</body>
</html>
